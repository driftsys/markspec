name: Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/spec/**"
      - "docs/guide/**"
      - "docs/theme/**"
      - "docs/markspec-cheatsheet.typ"
      - "docs/index.html"
      - ".github/workflows/pages.yaml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build books
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build spec book
        run: mdbook build docs/spec

      - name: Build guide book
        run: mdbook build docs/guide

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Build cheat sheet
        run: typst compile --font-path packages/markspec-typst/fonts docs/markspec-cheatsheet.typ _site/markspec-cheatsheet.pdf

      - name: Copy theme and landing page
        run: |
          cp -r docs/theme _site/theme
          cp docs/index.html _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
