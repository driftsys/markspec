name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: markspec
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: markspec
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: markspec
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile
        run: |
          deno compile --allow-read --allow-write --allow-run --allow-env \
            --target ${{ matrix.target }} \
            --output ${{ matrix.binary }} \
            packages/markspec/main.ts

      - name: Package
        run: |
          tar czf markspec-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          shasum -a 256 markspec-${{ matrix.target }}.tar.gz > markspec-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markspec-${{ matrix.target }}
          path: |
            markspec-${{ matrix.target }}.tar.gz
            markspec-${{ matrix.target }}.tar.gz.sha256

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256

  publish:
    name: Publish to JSR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish
        run: deno publish --allow-dirty
